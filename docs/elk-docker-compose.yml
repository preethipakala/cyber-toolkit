# ELK Stack Docker Compose — Quick local SIEM lab
# Usage:
#   docker-compose up -d
#   Open Kibana at http://localhost:5601  (user: elastic / pass: changeme)
#
# Requirements: Docker, Docker Compose, 4GB+ RAM

version: '3.8'

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=changeme
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "elastic:changeme", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000"   # TCP syslog input
      - "9600:9600"   # Monitoring API
    volumes:
      - ./docs/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=changeme
    depends_on:
      elasticsearch:
        condition: service_healthy

  wazuh:
    image: wazuh/wazuh:4.7.0
    container_name: wazuh
    ports:
      - "1514:1514"
      - "55000:55000"
    restart: unless-stopped

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    network_mode: host
    volumes:
      - /var/log/suricata:/var/log/suricata
    command: -i eth0
    restart: unless-stopped

  zeek:
    image: zeek/zeek:latest
    container_name: zeek
    network_mode: host
    volumes:
      - /usr/local/zeek/logs:/usr/local/zeek/logs
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/log/suricata:/var/log/suricata:ro
      - /usr/local/zeek/logs:/usr/local/zeek/logs:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped     

volumes:
  esdata:
    driver: local
